{% extends "base.html" %}
{% block title %}{{ '編輯教授' if professor else '新增教授' }} — 考古題收藏系統{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <h1 class="fw-bold mb-4">
            <i class="bi bi-{{ 'pencil' if professor else 'plus-circle' }} me-2"></i>
            {{ '編輯教授' if professor else '新增教授' }}
        </h1>
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label fw-medium">教授姓名 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name"
                               value="{{ professor.name if professor else '' }}" placeholder="例如：王大明" required>
                    </div>
                    <div class="mb-4">
                        <label for="subject_id" class="form-label fw-medium">所屬科目</label>
                        <select class="form-select" id="subject_id" name="subject_id">
                            <option value="">-- 請選擇科目 --</option>
                            {% for subject in subjects %}
                            <option value="{{ subject.id }}" {{ 'selected' if professor and professor.subject_id == subject.id }}>{{ subject.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>{{ '更新' if professor else '新增' }}</button>
                        <a href="{{ url_for('professors.list_professors') }}" class="btn btn-outline-secondary"><i class="bi bi-x-lg me-1"></i>取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
